<div class="container-fluid login-page" id="loginEl">

    <div class="login-card">

        <div class="login-header">
            <div class="login-icon">✚</div>

            <h2 class="login-title">
                ลงชื่อเข้าใช้งาน
            </h2>

            <p class="login-subtitle">
                ระบบนัดศัลยกรรมกระดูก
            </p>
        </div>

        <form
            id="loginform"
            class="login-form"
            onsubmit="handleLogin(event)"
            novalidate
        >

            <div class="mb-4">
                <label
                    for="username"
                    class="form-label login-label"
                >
                    ผู้ใช้งาน
                </label>

                <input
                    type="text"
                    class="form-control login-input"
                    id="username"
                    placeholder="กรอกชื่อผู้ใช้งาน"
                    autocomplete="username"
                    required
                >

                <div class="invalid-feedback">
                    โปรดกรอกชื่อผู้ใช้งาน
                </div>
            </div>

            <div class="mb-4">
                <label
                    for="password"
                    class="form-label login-label"
                >
                    รหัสผ่าน
                </label>

                <input
                    type="password"
                    class="form-control login-input"
                    id="password"
                    placeholder="กรอกรหัสผ่าน"
                    autocomplete="current-password"
                    required
                >

                <div class="invalid-feedback">
                    โปรดกรอกรหัสผ่าน
                </div>
            </div>

            <button
                id="login_btn"
                type="submit"
                class="btn login-button"
            >
                <span id="login_btn_text">
                    เข้าสู่ระบบ
                </span>

                <span
                    id="resp-spinnerA"
                    class="spinner-border spinner-border-sm d-none"
                    role="status"
                    aria-hidden="true"
                ></span>
            </button>

        </form>

        <div class="login-footer">
            โรงพยาบาลสมเด็จพระยุพราชเชียงของ
        </div>

    </div>

</div>
